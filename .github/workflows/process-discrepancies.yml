name: Process Discrepancies

on:
  workflow_dispatch:
    inputs:
      month:
        description: 'Month (1-12) - leave empty for previous month'
        required: false
        type: string
      year:
        description: 'Year (e.g., 2025) - leave empty for previous month'
        required: false
        type: string

jobs:
  process-discrepancies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install gspread google-auth google-auth-oauthlib google-api-python-client
      
      - name: Process Discrepancies
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          PAYSLIPS_FOLDER_ID: ${{ secrets.PAYSLIPS_FOLDER_ID }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.month }}" ]; then
            ARGS="$ARGS --month ${{ inputs.month }}"
          fi
          if [ -n "${{ inputs.year }}" ]; then
            ARGS="$ARGS --year ${{ inputs.year }}"
          fi
          python process_discrepancies.py $ARGS
