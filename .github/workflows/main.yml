name: Generate Payslips

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Year (leave empty for previous month)'
        required: false
        type: string
      month:
        description: 'Month 1-12 (leave empty for previous month)'
        required: false
        type: string

  schedule:
    - cron: '0 9 10 * *'

  repository_dispatch:
    types: [generate-payslips]

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests gspread google-auth reportlab python-dateutil
      
      - name: Generate Payslips
        env:
          DENTALLY_API_TOKEN: ${{ secrets.DENTALLY_API_TOKEN }}
          DENTALLY_SITE_ID: ${{ secrets.DENTALLY_SITE_ID }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          PAYSLIP_SPREADSHEET_ID: ${{ secrets.PAYSLIP_SPREADSHEET_ID }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.year }}" ]; then
            ARGS="$ARGS --year ${{ github.event.inputs.year }}"
          fi
          if [ -n "${{ github.event.inputs.month }}" ]; then
            ARGS="$ARGS --month ${{ github.event.inputs.month }}"
          fi
          python payslip_generator_v2.py $ARGS
